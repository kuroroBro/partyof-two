<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1600 1600" role="img" aria-labelledby="title desc">
  <title id="title">Party of Two hero background</title>
  <desc id="desc">Two large overlapping soft blobs, coral and teal, meeting at the center like a high five, with small gold confetti dots, on a warm cream background.</desc>
  <defs>
    <radialGradient id="bg" cx="50%" cy="10%" r="90%">
      <stop offset="0%" stop-color="#fff0e0"/>
      <stop offset="55%" stop-color="#fff6ec"/>
      <stop offset="100%" stop-color="#fff8f1"/>
    </radialGradient>
    <linearGradient id="coralGrad" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0%" stop-color="#ff6b5b"/>
      <stop offset="100%" stop-color="#ff8c6e"/>
    </linearGradient>
    <linearGradient id="tealGrad" x1="1" y1="0" x2="0" y2="1">
      <stop offset="0%" stop-color="#1c8c86"/>
      <stop offset="100%" stop-color="#14625e"/>
    </linearGradient>
    <radialGradient id="glowCoral" cx="50%" cy="50%" r="50%">
      <stop offset="0%" stop-color="#ff6b5b" stop-opacity="0.25"/>
      <stop offset="100%" stop-color="#ff6b5b" stop-opacity="0"/>
    </radialGradient>
    <radialGradient id="glowTeal" cx="50%" cy="50%" r="50%">
      <stop offset="0%" stop-color="#1c8c86" stop-opacity="0.25"/>
      <stop offset="100%" stop-color="#1c8c86" stop-opacity="0"/>
    </radialGradient>
  </defs>

  <rect width="1600" height="1600" fill="url(#bg)"/>
  <circle cx="480" cy="620" r="480" fill="url(#glowCoral)"/>
  <circle cx="1120" cy="620" r="480" fill="url(#glowTeal)"/>

  <g opacity="0.55" fill="#f4a637">
    <circle cx="230" cy="260" r="10"/>
    <circle cx="1360" cy="300" r="8"/>
    <circle cx="1420" cy="900" r="12"/>
    <circle cx="190" cy="960" r="7"/>
    <circle cx="800" cy="150" r="9"/>
  </g>

  <g transform="translate(800 700)">
    <circle cx="-190" cy="0" r="340" fill="url(#coralGrad)"/>
    <circle cx="190" cy="0" r="340" fill="url(#tealGrad)"/>
    <circle cx="0" cy="0" r="70" fill="#fff6ec"/>
    <circle cx="0" cy="0" r="70" fill="none" stroke="#f4a637" stroke-width="10"/>
  </g>

  <g opacity="0.9" fill="#fff6ec">
    <circle cx="640" cy="640" r="16"/>
    <circle cx="960" cy="640" r="16"/>
    <circle cx="620" cy="760" r="12"/>
    <circle cx="980" cy="760" r="12"/>
  </g>
</svg>
